model:
  name: GAMReg
  in_channels: 1
  encoder_channels: [4, 8, 12, 16]
  decoder_channels: [24, 16, 12, 8]
  token_dim: 16
  use_anatomy_head: false
  num_anatomy_classes: 0
  ablation_variant: full
  tokenizers:
    coarse:
      feature_level: 3
      token_grid: [2, 2, 2]
      sigma_min_ratio: 0.20
      sigma_max_ratio: 1.20
      offset_ratio: 0.35
    middle:
      feature_level: 2
      token_grid: [2, 2, 2]
      sigma_min_ratio: 0.20
      sigma_max_ratio: 1.20
      offset_ratio: 0.35
  matching:
    lambda_center: 1.0
    lambda_covariance: 0.5
    lambda_feature: 1.0
    lambda_anatomy: 0.0
    sinkhorn_epsilon: 0.1
    sinkhorn_iterations: 20
    middle_spatial_radius: 2.0
    large_cost: 10000.0
  propagation:
    token_chunk: 4
    mahalanobis_clip: 30.0
  integration:
    steps: 3
loss:
  lncc_window: [5, 5, 5]
  jacobian_minimum_determinant: 0.05
  weights:
    sim: 1.0
    feature: 0.20
    smooth: 0.05
    jacobian: 0.10
    dice: 1.0
    anchor: 0.50
    anatomy: 0.0
    token_regularization: 0.01
training:
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.00001
  gradient_clip_norm: 1.0
  amp: false
  amp_init_scale: 1024.0
  amp_growth_interval: 2000
  amp_max_retries: 8
  batch_size: 1
  stage_schedules:
    registration-warmup:
      ramp_steps: 2000
      anchor_start: 0.1
      jacobian_start: 0.0
data:
  image_normalization: hu
  target_shape: null
  spacing_dhw: [1.0, 1.0, 1.0]
