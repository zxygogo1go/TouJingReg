model:
  name: GAMReg
  in_channels: 1
  encoder_channels: [16, 32, 64, 128]
  decoder_channels: [256, 128, 64, 32]
  token_dim: 96
  use_anatomy_head: true
  num_anatomy_classes: 5
  ablation_variant: full
  tokenizers:
    coarse:
      feature_level: 3
      token_grid: [4, 4, 4]
      sigma_min_ratio: 0.20
      sigma_max_ratio: 1.20
      offset_ratio: 0.35
    middle:
      feature_level: 2
      token_grid: [6, 6, 6]
      sigma_min_ratio: 0.20
      sigma_max_ratio: 1.20
      offset_ratio: 0.35
  matching:
    lambda_center: 1.0
    lambda_covariance: 0.5
    lambda_feature: 1.0
    lambda_anatomy: 0.2
    sinkhorn_epsilon: 0.07
    sinkhorn_iterations: 30
    middle_spatial_radius: 1.0
    large_cost: 10000.0
  propagation:
    token_chunk: 32
    mahalanobis_clip: 30.0
  integration:
    steps: 7
loss:
  lncc_window: [9, 9, 9]
  weights:
    sim: 1.0
    feature: 0.20
    smooth: 0.05
    jacobian: 0.10
    dice: 1.0
    anchor: 0.50
    anatomy: 0.10
    token_regularization: 0.01
training:
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.00001
  gradient_clip_norm: 1.0
  amp: true
  batch_size: 1
